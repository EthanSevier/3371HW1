<!doctype html>
<!--
Program name: patient-form.html
Author: Ethan Sevier
Date created: 2/23/2026
Date last edited: 3/27/2026
Version: 1.8
Description: A mock patient registration form for Express Kidneys4Cash -->

<html>
    <head>
        <meta charset="utf-8">

        <title>Blank template</title>

        <!-- Load external CSS styles -->
        <link rel="stylesheet" href="styles.css">

    </head>

    <body>
        <div class="header">
            <h1>
                <p id="date"></p>
                <script>
                    const d = new Date();
                            document.getElementById("date").innerHTML = d;
                </script>
            
            </h1>

            <h2>
    
                <img src="./download_1_.png" alt="W3Schools.com" width="80" height="60">
                Express Kidneys4Cash
            </h2>

        </div>

        <h3>

            Registration Form

        </h3>

        <p>
            <form>
                <table>

                 
                    <tr>
                        <td>
                            <label for="fname">First name:</label><br>
                            <input type="text" id="fname" name="fname" maxlength="30" required>
                        </td>

                        <td>
                            <label for="lname">Last name:</label><br>
                            <input type="text" id="lname" name="lname" maxlength="30" required>
                        </td>

                        <td>
                            <label for="mint">MI:</label><br>
                            <input type="text" id="mint" name="mint" size="1" maxlength="1" required>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <label for="dob">Date Of Birth:</label><br>
                            <input type="date" id="dob" name="dob" required>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <label for="ssn">Social Security Number:</label><br>
                         <input type="password" id="ssn" name="ssn" maxlength="11" minlength="9" required>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <label for="addLine1">Address Line 1:</label><br>
                            <input type="text" id="addLine1" name="addLine1" maxlength="30" required>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <label for="addLine2">Address Line 2:</label><br>
                            <input type="text" id="addLine1" name="addLine2" maxlength="30">
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <label for="City">City:</label><br>
                            <input type="text" id="City" name="City" maxlength="30" required>
                        </td>

                        <td>
                            <label for="Zip">Zip Code:</label><br>
                            <input type="text" id="Zip" name="Zip" maxlength="10" minlength="5" required>
                        </td>

                        <td>
                            <label for="State">State:</label><br>
                             <select>
                                <option value="AL">AL</option>
                                <option value="AK">AK</option>
                                <option value="AR">AR</option>
                                <option value="AZ">AZ</option>
                                <option value="CA">CA</option>
                                <option value="CO">CO</option>
                                <option value="CT">CT</option>
                                <option value="DC">DC</option>
                                <option value="DE">DE</option>
                                <option value="FL">FL</option>
                                <option value="GA">GA</option>
                                <option value="HI">HI</option>
                                <option value="IA">IA</option>
                                <option value="ID">ID</option>
                                <option value="IL">IL</option>
                                <option value="IN">IN</option>
                                <option value="KS">KS</option>
                                <option value="KY">KY</option>
                                <option value="LA">LA</option>
                                <option value="MA">MA</option>
                                <option value="MD">MD</option>
                                <option value="ME">ME</option>
                                <option value="MI">MI</option>
                                <option value="MN">MN</option>
                                <option value="MO">MO</option>
                                <option value="MS">MS</option>
                                <option value="MT">MT</option>
                                <option value="NC">NC</option>
                                <option value="NE">NE</option>
                                <option value="NH">NH</option>
                                <option value="NJ">NJ</option>
                                <option value="NM">NM</option>
                                <option value="NV">NV</option>
                                <option value="NY">NY</option>
                                <option value="ND">ND</option>
                                <option value="OH">OH</option>
                                <option value="OK">OK</option>
                                <option value="OR">OR</option>
                                <option value="PA">PA</option>
                                <option value="PR">PR</option>
                                <option value="RI">RI</option>
                                <option value="SC">SC</option>
                                <option value="SD">SD</option>
                                <option value="TN">TN</option>
                                <option value="TX">TX</option>
                                <option value="UT">UT</option>
                                <option value="VT">VT</option>
                                <option value="VA">VA</option>
                                <option value="WA">WA</option>
                                <option value="WI">WI</option>
                                <option value="WV">WV</option>
                                <option value="WY">WY</option>
                            </select>

                    </tr>

                    <tr>

                        <td>
                            <label for="email">Email:</label><br>
                            <input type="email" id="Email" name="Email" maxlength="30"  required>
                        </td>

                        <td>
                            <label for="Phone">Phone (111-111-1111):</label><br>
                            <input type="tel" id="Phone" name="Phone" maxlength="12" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" required>&nbsp;&nbsp;&nbsp;Opt-in for texts?
                            <input type="radio" id="radio" name="textOptin" value="Yes" required>
                            <label for="Yes1">Yes</label>
                            <input type="radio" id="radio" name="textOptin" value="No">
                            <label for="No1">No</label>
                        </td>


                    </tr>

                    <tr>
                        <td>
                            <label for="medications">List any medications you are currently taking:</label><br>
                            <textarea rows="4" cols="50" required></textarea>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <label for="medHistory">Describe your medical history:</label><br>
                            <textarea rows="4" cols="50"></textarea>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <div class="slidecontainer">
                            <label for="myRange">Select your current pain level:</label>
                            <input type="range" min="1" max="100" value="50" class="slider" id="myRange">
                            </div>
                        </td>

                    </tr>

                    <tr>

                        <td> 
                            <input type="checkbox" id="Symptom" name="Cough" value="Cough">
                            <label for="Cough"> Cough&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>

                            <input type="checkbox" id="Symptom" name="Sore Throat" value="Sore Throat">
                            <label for="Sore Throat"> Sore Throat</label>

                            <input type="checkbox" id="Symptom" name="Vomiting / Nausea" value="Vomiting / Nausea">
                            <label for="Vomiting / Nausea"> Vomiting / Nausea</label><br>

                            <input type="checkbox" id="Symptom" name="Fever" value="Fever">
                            <label for="Fever"> Fever&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>

                            <input type="checkbox" id="Symptom" name="Headache" value="Headache">
                            <label for="Headache"> Headache</label>

                            <input type="checkbox" id="Symptom" name="Fatigue" value="Fatigue">
                            <label for="Fatigue"> Fatigue</label><br>

                            <input type="checkbox" id="Symptom" name="Body aches" value="Body aches">
                            <label for="Body aches"> Body aches</label>

                            <input type="checkbox" id="Symptom" name="Diarrhea" value="Diarrhea">
                            <label for="Diarrhea"> Diarrhea</label>

                            <input type="checkbox" id="Symptom" name="Dizziness" value="Dizziness">
                            <label for="Dizziness"> Dizziness</label>
                        </td>


                    </tr>
                    
                    <tr>

                        <td> How are you paying?
                            <input type="radio" id="radio" name="Insurance" value="Yes" required>
                            <label for="CashCard">Cash/Card</label>
                            <input type="radio" id="radio" name="Insurance" value="No">
                            <label for="Insurance">Insurance</label>
                        </td>
                    </tr>
                    <tr>
                        <td> What is your sex as assigned at birth?
                            <input type="radio" id="radio" name="Sex" value="Male" required>
                            <label for="Sex">Male</label>
                            <input type="radio" id="radio" name="Sex" value="Female">
                            <label for="Sex">Female</label>
                        </td>
                    </tr>

                    <tr>

                        <td>
                            <label for="UserID">Creat a UserID:</label><br>
                            <input type="text" id="UserID" name="UserID" maxlength="20" required >
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <label for="password">Creat a password:</label><br>
                            <input type="password" id="password" name="password" maxlength="30" required>
                        </td>

                    </tr>

                    <tr>

                        <td>
                            <label for="repassword">Confirm password:</label><br>
                            <input type="password" id="repassword" name="repassword" maxlength="30" required>
                        </td>

                    </tr>

                </table>
                <div class="final">
                    <input type="reset" value="Reset" />
                    <input type="submit" value="Submit" onclick="window.location.href='./thankyou.html';"/>
                </div>
                
            </form>
        </p>
             
        <div class="footer">
            <span class="buttons">
                Contact Us:</br> 
                <a href="https://www.instagram.com/joelosteen/">Instagram</a></br>
                <a href="https://www.x.com/">Twitter</a></br> 
            </span>
            Express Kidneys4Cash</br> 
            3700 Southwest Fwy, Houston, TX 77027</br>
            +18002780520
                
        </div>

    </body>

</html>
